<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-container">

    <h2>Iniciar Sesión</h2>

    <form id="loginForm">

        <input
            type="text"
            id="username"
            placeholder="Usuario"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
            required
        >

        <button type="submit">
            Ingresar
        </button>

    </form>

</div>

<script src="js/auth.js"></script>

</body>
</html>
